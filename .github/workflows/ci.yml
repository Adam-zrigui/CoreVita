name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: corevita
          POSTGRES_PASSWORD: corevita
          POSTGRES_DB: corevita
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://corevita:corevita@localhost:5432/corevita
      DIRECT_URL: postgresql://corevita:corevita@localhost:5432/corevita
      NEXTAUTH_SECRET: test-secret-do-not-use-in-production
      NEXT_PUBLIC_FIREBASE_API_KEY: test
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: test
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: test
      NEXT_PUBLIC_FIREBASE_APP_ID: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - run: npx prisma generate

      - run: npx prisma db push --accept-data-loss

      - run: npx vitest run
        env:
          SENTRY_DSN: ""
          SENTRY_ORG: ""
          SENTRY_PROJECT: ""

      - run: pnpm lint
        continue-on-error: true
